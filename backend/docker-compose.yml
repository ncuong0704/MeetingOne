version: '3.8'

services:
  # Meeting Summarizer Python App
  MeetingOne-backend:
    build:
      context: .
      dockerfile: Dockerfile.app
    image: MeetingOne-backend:latest
    container_name: MeetingOne-backend
    restart: unless-stopped

    ports:
      - "${APP_PORT:-5167}:5167"

    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - DATABASE_PATH=/app/data/meeting_minutes.db
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./data:/app/data
      - meeting_app_logs:/app/logs
      - ${LOCAL_ENV_FILE:-./app/.env}:/app/.env:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5167/get-meetings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    mem_limit: 2g
    mem_reservation: 512m

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  meeting_app_logs:
    driver: local

networks:
  default:
    name: MeetingOne-network
